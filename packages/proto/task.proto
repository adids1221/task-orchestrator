syntax = "proto3";

package task;

// The Task represents the CURRENT state of a task
message Task {
  string id = 1;
  string project_id = 2;
  string title = 3;
  string description = 4;
  string status = 5; 
  string assignee_id = 6;
  string creator_id = 7;
  string task_number = 8;
  string created_at = 9;
  string updated_at = 10; 
}

// The history of status changes
message TaskHistoryEntry {
  string id = 1;
  string task_id = 2;
  string changed_by_user_id = 3;
  string old_status = 4;
  string new_status = 5;
  string changed_at = 6;
}

message TaskHistoryList {
  repeated TaskHistoryEntry entries = 1;
}

message Project {
  string id = 1;
  string name = 2;
  string description = 3;
  string creator_id = 4;
}

// --- Request/Response Messages ---

message CreateTaskRequest {
  string project_id = 1;
  string title = 2;
  string description = 3;
}

message UpdateStatusRequest {
  string task_id = 1;
  string new_status = 2;
}

message UpdateTaskRequest {
  string task_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional string assignee_id = 4;
}

message TaskFilter {
  string status = 1;
  string assignee_id = 2;
  string project_id = 3;
  string team_id = 4;
  string search_query = 5;
}

message TaskList {
  repeated Task tasks = 1;
}

message ProjectList {
  repeated Project projects = 1;
}

// NEW: Wrapper for DeleteTask
message DeleteTaskRequest {
  string task_id = 1;
}

// NEW: Wrapper for GetTaskHistory
message GetTaskHistoryRequest {
  string task_id = 1;
}

message CreateProjectRequest {
  string name = 1;
  string description = 2;
}

message ListProjectsRequest {}

message Empty {}

// --- The TaskService ---

service TaskService {
  rpc CreateTask(CreateTaskRequest) returns (Task);
  rpc UpdateTaskStatus(UpdateStatusRequest) returns (Task);
  rpc UpdateTask(UpdateTaskRequest) returns (Task);
  rpc ListTasks(TaskFilter) returns (TaskList);
  rpc CreateProject(CreateProjectRequest) returns (Project);
  rpc ListProjects(ListProjectsRequest) returns (ProjectList);

  
  // UPDATED: Now using messages instead of raw strings
  rpc DeleteTask(DeleteTaskRequest) returns (Empty);
  rpc GetTaskHistory(GetTaskHistoryRequest) returns (TaskHistoryList);
}